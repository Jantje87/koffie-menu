<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffie Bestellen</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f3ef;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #3e2723;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.selected {
  border: 3px solid #6d4c41;
}

button {
  width: 100%;
  padding: 15px;
  background: #6d4c41;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h1>☕ Koffie Menu</h1>

<div class="container" id="menu"></div>
<button onclick="placeOrder()">Bestelling bevestigen</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
  authDomain: "koffie-bestellen.firebaseapp.com",
  databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "koffie-bestellen"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const coffees = [
  "Espresso",
  "Long Black",
  "Latte Macchiato",
  "Latte Macchiato + Pumpkin Spice",
  "Latte Macchiato + Vanille",
  "Latte Macchiato + Caramel"
];

let selectedCoffee = null;

const menuDiv = document.getElementById("menu");

// Extra opties container
const optionsDiv = document.createElement("div");
optionsDiv.style.marginTop = "15px";
menuDiv.after(optionsDiv);

function showOptions(coffee) {
  optionsDiv.innerHTML = "";

  if (coffee === "Espresso" || coffee === "Long Black") {
    optionsDiv.innerHTML += `
      <label><input type="checkbox" id="milk"> Melk</label><br>
      <label><input type="checkbox" id="sugar"> Suiker</label>
    `;
  } else if (coffee.includes("Latte")) {
    optionsDiv.innerHTML += `
      <label><input type="checkbox" id="sugar"> Suiker</label>
    `;
  }
}

coffees.forEach(coffee => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerText = coffee;

  div.onclick = () => {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
    div.classList.add("selected");
    selectedCoffee = coffee;
    showOptions(coffee);
  };

  menuDiv.appendChild(div);
});

window.placeOrder = function() {
  if (!selectedCoffee) {
    alert("Kies eerst een koffie ☕");
    return;
  }

  const milk = document.getElementById("milk")?.checked || false;
  const sugar = document.getElementById("sugar")?.checked || false;

  push(ref(db, "orders"), {
    coffee: selectedCoffee,
    milk: milk,
    sugar: sugar,
    time: new Date().toLocaleTimeString(),
    status: "nieuw"
  });

  alert("Bestelling geplaatst!");
  location.reload();
}
</script>
