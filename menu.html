<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffie Menu</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f6f1ec;
margin:0;
padding:0;
}

/* NAAM SCHERM */

#name-screen{
max-width:400px;
margin:40px auto;
text-align:center;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

#name-screen input{
width:80%;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin:10px 0;
}

/* MENU */

#menu-screen{
max-width:900px;
margin:20px auto 120px auto;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

/* CARD */

.card{
background:white;
border-radius:16px;
padding:14px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card.selected{
border:2px solid #c98a3a;
background:rgba(201,138,58,0.08);
}

.card img{
width:130px;
height:130px;
object-fit:contain;
}

.card span{
display:block;
font-weight:bold;
margin-top:6px;
}

/* OPTIONS */

.card-options{
margin-top:10px;
display:flex;
gap:10px;
justify-content:center;
}

.opt{
font-size:14px;
}

/* STICKY ORDER BAR */

.sticky-order{
position:fixed;
bottom:0;
left:0;
right:0;
background:#f6f1ec;
padding:16px;
box-shadow:0 -10px 20px rgba(0,0,0,0.08);
display:none;
}

.sticky-inner{
max-width:900px;
margin:auto;
display:flex;
}

.sticky-label{
font-weight:bold;
font-size:16px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.btn-primary{
background:#6d4c41;
color:white;
}

.btn-order{
background:#c98a3a;
color:white;
font-weight:bold;
width:100%;
font-size:18px;
padding:16px;
}

/* TABLET */

@media (max-width:900px){

.grid{
grid-template-columns:repeat(3,1fr);
}

}

/* MOBILE */

@media (max-width:600px){

.grid{
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card img{
width:120px;
height:120px;
}

}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain: "koffie-bestellen.firebaseapp.com",
databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "koffie-bestellen",
storageBucket: "koffie-bestellen.firebasestorage.app",
messagingSenderId: "592791423506",
appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selectedCoffee=null;

/* THUISLOCATIE */

const HOME_LAT = 52.123456;   // <-- aanpassen
const HOME_LNG = 5.123456;    // <-- aanpassen
const ALLOWED_RADIUS_METERS = 100;

/* DISTANCE */

function getDistance(lat1,lon1,lat2,lon2){

const R=6371000;
const toRad=(v)=>v*Math.PI/180;

const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);

const a =
Math.sin(dLat/2)**2 +
Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
Math.sin(dLon/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function checkLocation(){

return new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(position=>{

const userLat=position.coords.latitude;
const userLng=position.coords.longitude;

const distance=getDistance(userLat,userLng,HOME_LAT,HOME_LNG);

resolve({
allowed:distance<=ALLOWED_RADIUS_METERS,
distance
});

},
error=>reject(error),
{enableHighAccuracy:true});

});

}

/* OPTIONS */

function showOptions(cardElement, coffeeName){

const optionsDiv=document.createElement("div");
optionsDiv.className="card-options";

const sugarIcon = `
<svg width="20" height="20" viewBox="0 0 24 24" fill="#ffffff" stroke="#d7ccc8" stroke-width="1.5">
<rect x="3" y="8" width="8" height="8" rx="2"/>
<rect x="9" y="4" width="8" height="8" rx="2"/>
<rect x="13" y="10" width="8" height="8" rx="2"/>
</svg>
`;

if(
coffeeName==="Espresso" ||
coffeeName==="Long Black" ||
coffeeName==="Lungo"
){

optionsDiv.innerHTML=`

<label class="opt">
<input type="checkbox" class="milk-checkbox"> 🥛
</label>

<label class="opt">
<input type="checkbox" class="sugar-checkbox"> ${sugarIcon}
</label>

`;

}

else if(coffeeName.includes("Latte Macchiato")){

optionsDiv.innerHTML=`

<label class="opt">
<input type="checkbox" class="sugar-checkbox"> ${sugarIcon}
</label>

`;

}

optionsDiv.querySelectorAll("input").forEach(cb=>{
cb.addEventListener("click", e => e.stopPropagation());
});

cardElement.appendChild(optionsDiv);

}

/* ORDER */

async function placeOrder(coffee){

try{

const locationCheck=await checkLocation();

if(!locationCheck.allowed){

alert("Bestellen kan alleen bij mij thuis.\nJe bent ongeveer "+Math.round(locationCheck.distance)+" meter verwijderd.");
return;

}

}catch{

alert("Sta locatietoegang toe om te bestellen.");
return;

}

const card=document.querySelector(".card.selected");

const milk=card.querySelector(".milk-checkbox")?.checked||false;
const sugar=card.querySelector(".sugar-checkbox")?.checked||false;

const order={
name:localStorage.getItem("customerName"),
coffee,
milk,
sugar,
timestamp:Date.now()
};

push(ref(db,"orders"),order);

alert("Bestelling geplaatst ☕");

document.getElementById("sticky-order").style.display="none";

}

/* MENU */

function initMenu(){

const grid=document.getElementById("menu-grid");
const productsRef=ref(db,"products");

onValue(productsRef,snapshot=>{

grid.innerHTML="";

snapshot.forEach(child=>{

const product=child.val();
if(!product.available) return;

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=product.img;

const name=document.createElement("span");
name.innerText=product.name;

card.appendChild(img);
card.appendChild(name);

card.onclick=(e)=>{

if(e.target.tagName==="INPUT") return;

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected");
c.querySelector(".card-options")?.remove();
});

card.classList.add("selected");

selectedCoffee=product.name;

showOptions(card,product.name);

document.getElementById("sticky-order-btn").innerHTML=
"☕ Bestel "+product.name;

document.getElementById("sticky-order").style.display="block";

document.getElementById("sticky-order-btn").onclick=()=>{
placeOrder(product.name);
};

};

grid.appendChild(card);

});

});

}

/* NAAM */

window.onload=()=>{

const savedName=localStorage.getItem("customerName");

if(savedName){

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";
initMenu();

}

document.getElementById("next-btn").onclick=()=>{

const name=document.getElementById("customer-name").value.trim();

if(!name){
alert("Vul eerst je naam in");
return;
}

localStorage.setItem("customerName",name);

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

};

};

</script>

</head>

<body>

<div id="name-screen">

<h2>Vul je naam in</h2>

<input id="customer-name" placeholder="Naam">

<br><br>

<button class="btn btn-primary" id="next-btn">
Volgende
</button>

</div>

<div id="menu-screen">

<div class="grid" id="menu-grid"></div>

</div>

<div class="sticky-order" id="sticky-order">

<div class="sticky-inner">

<button class="btn btn-order" id="sticky-order-btn">
☕ Bestellen
</button>

</div>

</div>

</body>
</html>
