<style>
  :root{
    --bg: #f6f1ec;
    --panel: rgba(255,255,255,0.78);
    --card: #ffffff;
    --text: #2b2b2b;
    --muted: #6f6a66;
    --border: #e9dfd7;

    --brand: #6d4c41;
    --brand2: #8d6e63;

    --caramel: #c98a3a;
    --caramelSoft: rgba(201,138,58,0.14);

    --shadow: 0 14px 34px rgba(0,0,0,0.08);
    --shadow2: 0 10px 20px rgba(0,0,0,0.06);
    --radius: 18px;
  }

  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      radial-gradient(1200px 800px at 15% 0%, rgba(255,255,255,0.9), rgba(255,255,255,0) 55%),
      radial-gradient(1000px 700px at 90% 10%, rgba(255,246,235,0.9), rgba(255,255,255,0) 60%),
      var(--bg);
    color: var(--text);
  }

  /* Naam scherm */
  #name-screen{
    width: min(420px, 92vw);
    margin: 34px auto;
    text-align: center;
    background: var(--panel);
    backdrop-filter: blur(8px);
    padding: 26px 22px;
    border-radius: 22px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  #name-screen h2{
    margin: 0 0 8px;
    color: var(--brand);
    letter-spacing: .2px;
  }

  #name-screen p{
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 14px;
  }

  #name-screen input{
    width: 100%;
    padding: 12px 14px;
    margin: 12px 0 14px;
    font-size: 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    outline: none;
    background: rgba(255,255,255,0.9);
  }
  #name-screen input:focus{
    border-color: rgba(201,138,58,0.55);
    box-shadow: 0 0 0 4px rgba(201,138,58,0.12);
  }

  .btn{
    border: none;
    cursor: pointer;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 750;
    letter-spacing: .2px;
    transition: transform .05s ease, box-shadow .2s ease, opacity .2s ease;
    user-select:none;
  }
  .btn:active{ transform: translateY(1px); }

  .btn-primary{
    width: 100%;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    color: #fff;
    box-shadow: 0 10px 18px rgba(109,76,65,0.25);
  }
  .btn-primary:hover{ box-shadow: 0 14px 24px rgba(109,76,65,0.30); }

  .btn-ghost{
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* Menu layout */
  #menu-screen{
    width: min(960px, 96vw);
    margin: 18px auto 90px;
    padding: 10px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    margin: 6px 0 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow2);
  }

  .who{
    display:flex;
    flex-direction: column;
    gap: 2px;
  }
  .who .label{ font-size: 12px; color: var(--muted); }
  .who .name{ font-size: 15px; font-weight: 800; color: var(--brand); }

  /* Grid (matcht menu-icons) */
  .grid{
    display:grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .card{
    background: rgba(255,255,255,0.88);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow2);
    padding: 14px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .18s ease, border-color .18s ease;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .card::after{
    content:"";
    position:absolute;
    inset:-30px;
    background: radial-gradient(400px 220px at 50% -10%, rgba(201,138,58,0.18), rgba(255,255,255,0));
    opacity:0;
    transition: opacity .18s ease;
    pointer-events:none;
  }

  .card:hover{
    transform: translateY(-2px);
    box-shadow: 0 16px 26px rgba(0,0,0,0.08);
  }
  .card:hover::after{ opacity: 1; }

  .card.selected{
    border-color: rgba(201,138,58,0.75);
    box-shadow: 0 18px 30px rgba(201,138,58,0.16);
  }

  .card img{
    width: 140px;
    height: 140px;
    object-fit: contain;
    border-radius: 16px;
    background: transparent;
  }

  .card span{
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
  }

  /* Options */
  .card-options{
    width: 100%;
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding-top: 8px;
    border-top: 1px dashed rgba(233,223,215,0.9);
    margin-top: 4px;
  }

  .opt{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.75);
    font-size: 14px;
    color: var(--text);
    user-select:none;
  }

  .opt input{
    width: 18px;
    height: 18px;
    accent-color: var(--caramel);
  }

  /* Sticky order bar (mobiel fijn) */
  .sticky-order{
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 12px;
    background: rgba(246,241,236,0.75);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    box-shadow: 0 -12px 30px rgba(0,0,0,0.08);
    display:none;
  }

  .sticky-inner{
    width: min(960px, 96vw);
    margin: 0 auto;
    display:flex;
    gap: 10px;
    align-items:center;
    justify-content: space-between;
  }

  .sticky-label{
    font-weight: 800;
    color: var(--brand);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 55%;
  }

  .order-btn{
    display:none; /* we gebruiken sticky button */
  }

  .btn-order{
    background: linear-gradient(135deg, var(--caramel), #e0a24b);
    color: white;
    box-shadow: 0 14px 24px rgba(201,138,58,0.22);
    padding: 12px 16px;
    border-radius: 14px;
    font-weight: 850;
    white-space: nowrap;
  }

  /* Responsive */
  @media (max-width: 980px){
    .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 720px){
    .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card img{ width: 132px; height: 132px; }
  }
  @media (max-width: 420px){
    .card img{ width: 120px; height: 120px; }
  }
</style>
