<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koffie Menu</title>

<style>

body{
font-family:Arial;
background:#f6f1ec;
margin:0;
}

/* naam scherm */

#name-screen{
max-width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

#name-screen input{
width:80%;
padding:12px;
margin-top:15px;
}

/* menu */

#menu-screen{
max-width:900px;
margin:auto;
padding:20px;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:white;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card.selected{
border:3px solid #c98a3a;
}

/* sticky knop */

.sticky-order{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
display:none;
box-shadow:0 -6px 12px rgba(0,0,0,0.1);
}

.btn-order{
width:100%;
padding:16px;
background:#c98a3a;
border:none;
border-radius:12px;
font-size:18px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* status scherm */

#coffee-status{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.coffee-card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:340px;
}

/* machine animatie */

.machine{
width:240px;
margin:auto;
}

.espresso-flow{
animation:espressoPour 2.5s infinite;
transform-origin:top;
}

.espresso-flow.right{
animation-delay:.15s;
}

@keyframes espressoPour{
0%{height:0}
40%{height:42px}
80%{height:42px}
100%{height:0}
}

.coffee-fill{
animation:cupFill 2.5s infinite;
}

@keyframes cupFill{
0%{height:0;y:160}
50%{height:14px;y:160}
80%{height:22px;y:152}
100%{height:0;y:160}
}

.crema-fill{
animation:crema 2.5s infinite;
}

@keyframes crema{
0%{height:0;y:158}
50%{height:3px;y:158}
80%{height:4px;y:156}
100%{height:0;y:158}
}

.steam{
opacity:0;
animation:steamRise 2.5s infinite;
}

.s1{animation-delay:.5s}
.s2{animation-delay:1s}

@keyframes steamRise{
0%{opacity:0;transform:translateY(10px)}
50%{opacity:.7}
100%{opacity:0;transform:translateY(-10px)}
}

.ready{
font-size:50px;
}

</style>

</head>

<body>

<div id="name-screen">

<h2>Vul je naam in</h2>
<input id="customer-name">

<br><br>

<button id="next-btn">Start</button>

</div>

<div id="menu-screen">
<div class="grid" id="menu-grid"></div>
</div>

<div class="sticky-order" id="sticky-order">
<button id="order-btn" class="btn-order">☕ Bestellen</button>
</div>

<div id="coffee-status">

<div class="coffee-card" id="coffee-card">

<h2 id="status-title">Je koffie wordt gezet...</h2>

<div class="machine">

<svg viewBox="0 0 260 180">

<!-- machine body -->
<rect x="40" y="30" width="180" height="70" rx="8" fill="#d9d9d9"/>
<rect x="40" y="30" width="180" height="12" fill="#bdbdbd"/>

<!-- grouphead -->
<circle cx="130" cy="95" r="12" fill="#888"/>
<rect x="122" y="90" width="16" height="16" fill="#666"/>

<!-- portafilter -->
<rect x="105" y="106" width="50" height="8" rx="3" fill="#333"/>

<!-- dubbele spouts -->
<rect x="118" y="114" width="6" height="8" fill="#444"/>
<rect x="136" y="114" width="6" height="8" fill="#444"/>

<!-- espresso -->
<rect class="espresso-flow" x="120" y="122" width="4" height="0" fill="#4a250a"/>
<rect class="espresso-flow right" x="138" y="122" width="4" height="0" fill="#4a250a"/>

<!-- kopje -->
<path d="M95 145 L165 145 L158 170 L102 170 Z"
fill="white"
stroke="#444"
stroke-width="3"/>

<!-- koffie -->
<rect class="coffee-fill" x="102" y="160" width="56" height="0" fill="#5a2d0c"/>

<!-- crema -->
<rect class="crema-fill" x="102" y="158" width="56" height="0" fill="#c98a3a"/>

<!-- stoom -->
<path class="steam s1"
d="M120 135 C110 120 130 120 125 100"
stroke="#bbb"
stroke-width="3"
fill="none"/>

<path class="steam s2"
d="M140 135 C130 120 150 120 145 100"
stroke="#bbb"
stroke-width="3"
fill="none"/>

</svg>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain:"koffie-bestellen.firebaseapp.com",
databaseURL:"https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"koffie-bestellen",
storageBucket:"koffie-bestellen.firebasestorage.app",
messagingSenderId:"592791423506",
appId:"1:592791423506:web:b4901c0cd2cf9094b9e6cb"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let selectedCoffee=null;

/* locatie */

const HOME_LAT = 53.25327032716371;
const HOME_LNG = 6.587397261441371;
const ALLOWED_RADIUS = 120;

function distance(lat1,lon1,lat2,lon2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

}

function checkLocation(){

return new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(pos=>{

const d=distance(
pos.coords.latitude,
pos.coords.longitude,
HOME_LAT,
HOME_LNG
);

resolve(d<ALLOWED_RADIUS);

},reject);

});

}

/* pump geluid */

function playPumpSound(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="sawtooth";
osc.frequency.value=120;

osc.connect(gain);
gain.connect(ctx.destination);

gain.gain.setValueAtTime(0.001,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.15,ctx.currentTime+0.02);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.2);

osc.start();
osc.stop(ctx.currentTime+1.3);

}

/* menu */

function initMenu(){

const grid=document.getElementById("menu-grid");

onValue(ref(db,"products"),(snapshot)=>{

grid.innerHTML="";

snapshot.forEach(child=>{

const p=child.val();

if(!p.available) return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`<img src="${p.img}"><div>${p.name}</div>`;

card.onclick=()=>{

document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));

card.classList.add("selected");

selectedCoffee=p.name;

document.getElementById("sticky-order").style.display="block";

document.getElementById("order-btn").innerText="☕ Bestel "+p.name;

};

grid.appendChild(card);

});

});

}

/* bestelling */

async function placeOrder(){

if(!selectedCoffee) return;

const allowed=await checkLocation();

if(!allowed){

alert("Bestellen kan alleen bij mij thuis.");
return;

}

const orderRef=push(ref(db,"orders"),{

name:localStorage.getItem("customerName"),
coffee:selectedCoffee,
milk:false,
sugar:false,
completed:false,
timestamp:Date.now()

});

showBrewing();

listenForCompletion(orderRef.key);

playPumpSound();

}

function showBrewing(){

document.getElementById("coffee-status").style.display="flex";

}

function listenForCompletion(id){

onValue(ref(db,"orders/"+id),(snap)=>{

const order=snap.val();

if(order && order.completed){

showReady();

}

});

}

function showReady(){

const card=document.getElementById("coffee-card");

card.innerHTML=`<div class="ready">✅</div><h2>Je koffie is klaar!</h2>`;

setTimeout(()=>{

document.getElementById("coffee-status").style.display="none";

},3000);

}

/* start */

window.onload=()=>{

const saved=localStorage.getItem("customerName");

if(saved){

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

}

document.getElementById("next-btn").onclick=()=>{

localStorage.setItem("customerName",
document.getElementById("customer-name").value);

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

};

document.getElementById("order-btn").addEventListener("click",placeOrder);

};

</script>

</body>
</html>
