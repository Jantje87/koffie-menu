<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffie Menu</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f6f1ec;
margin:0;
padding:0;
}

#name-screen{
max-width:400px;
margin:40px auto;
text-align:center;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

#name-screen input{
width:80%;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin:10px 0;
}

#menu-screen{
max-width:900px;
margin:20px auto;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.card{
background:white;
border-radius:16px;
padding:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card.selected{
border:2px solid #c98a3a;
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card-options{
margin-top:10px;
display:flex;
gap:10px;
justify-content:center;
}

.sticky-order{
position:fixed;
bottom:0;
left:0;
right:0;
background:#f6f1ec;
padding:12px;
box-shadow:0 -10px 20px rgba(0,0,0,0.08);
display:none;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.btn-primary{
background:#6d4c41;
color:white;
}

.btn-order{
background:#c98a3a;
color:white;
font-weight:bold;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain: "koffie-bestellen.firebaseapp.com",
databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "koffie-bestellen",
storageBucket: "koffie-bestellen.firebasestorage.app",
messagingSenderId: "592791423506",
appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selectedCoffee=null;

/* ------------------------------------------------ */
/* THUISLOCATIE INSTELLINGEN */
/* ------------------------------------------------ */

const HOME_LAT = 53.25321897785381;   // <-- vervang dit
const HOME_LNG = 6.587311427043095;    // <-- vervang dit
const ALLOWED_RADIUS_METERS = 100;

/* ------------------------------------------------ */

function getDistance(lat1, lon1, lat2, lon2){

const R=6371000;
const toRad=(v)=>v*Math.PI/180;

const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);

const a =
Math.sin(dLat/2)**2+
Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function checkLocation(){

return new Promise((resolve,reject)=>{

if(!navigator.geolocation){
reject("Geolocatie niet ondersteund");
return;
}

navigator.geolocation.getCurrentPosition(position=>{

const userLat=position.coords.latitude;
const userLng=position.coords.longitude;

const distance=getDistance(
userLat,
userLng,
HOME_LAT,
HOME_LNG
);

resolve({
allowed:distance<=ALLOWED_RADIUS_METERS,
distance:distance
});

},error=>reject(error),
{
enableHighAccuracy:true,
timeout:10000
});

});

}

function showOptions(card){

const div=document.createElement("div");
div.className="card-options";

div.innerHTML=`
<label><input type="checkbox" class="milk-checkbox"> 🥛 Melk</label>
<label><input type="checkbox" class="sugar-checkbox"> 🍬 Suiker</label>
`;

card.appendChild(div);

}

async function placeOrder(coffee){

try{

const locationCheck=await checkLocation();

if(!locationCheck.allowed){

alert("Bestellen kan alleen bij mij thuis.\nJe bent ongeveer "+Math.round(locationCheck.distance)+" meter verwijderd.");

return;

}

}catch(err){

alert("Sta locatietoegang toe om te bestellen.");
return;

}

const selectedCard=document.querySelector(".card.selected");

const milk=selectedCard.querySelector(".milk-checkbox")?.checked||false;
const sugar=selectedCard.querySelector(".sugar-checkbox")?.checked||false;

const order={
name:localStorage.getItem("customerName"),
coffee:coffee,
milk:milk,
sugar:sugar,
timestamp:Date.now()
};

push(ref(db,"orders"),order);

alert("Bestelling geplaatst ☕");

document.getElementById("sticky-order").style.display="none";

}

function initMenu(){

const grid=document.getElementById("menu-grid");

const productsRef=ref(db,"products");

onValue(productsRef,(snapshot)=>{

grid.innerHTML="";

snapshot.forEach(child=>{

const product=child.val();

if(!product.available) return;

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=product.img;

const name=document.createElement("div");
name.innerText=product.name;

card.appendChild(img);
card.appendChild(name);

card.onclick=()=>{

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected");
c.querySelector(".card-options")?.remove();
});

card.classList.add("selected");

selectedCoffee=product.name;

showOptions(card);

document.getElementById("sticky-order").style.display="block";
document.getElementById("sticky-label").innerText=product.name;

document.getElementById("sticky-order-btn").onclick=()=>{
placeOrder(product.name);
};

};

grid.appendChild(card);

});

});

}

window.onload=()=>{

const savedName=localStorage.getItem("customerName");

if(savedName){

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";
initMenu();

}

document.getElementById("next-btn").onclick=()=>{

const name=document.getElementById("customer-name").value.trim();

if(!name){
alert("Vul eerst je naam in");
return;
}

localStorage.setItem("customerName",name);

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

};

};

</script>
</head>

<body>

<div id="name-screen">
<h2>Vul je naam in</h2>
<input id="customer-name" placeholder="Naam">
<br><br>
<button class="btn btn-primary" id="next-btn">Volgende</button>
</div>

<div id="menu-screen">

<div class="grid" id="menu-grid"></div>

</div>

<div class="sticky-order" id="sticky-order">

<span id="sticky-label"></span>

<button class="btn btn-order" id="sticky-order-btn">
☕ Bestelling plaatsen
</button>

</div>

</body>
</html>
