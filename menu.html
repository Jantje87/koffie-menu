<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koffie Menu</title>

<style>

body{
font-family:Arial;
background:#f6f1ec;
margin:0;
}

/* naam scherm */

#name-screen{
max-width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

#name-screen input{
width:80%;
padding:12px;
margin-top:15px;
}

/* menu */

#menu-screen{
max-width:900px;
margin:auto;
padding:20px;
padding-bottom:140px;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:white;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
transition:0.2s;
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card.selected{
border:3px solid #c98a3a;
}

/* opties uitklappen */

.card-options{
max-height:0;
overflow:hidden;
transition:max-height 0.3s ease;
margin-top:8px;
display:flex;
flex-direction:column;
gap:6px;
font-size:14px;
}

.card.selected .card-options{
max-height:120px;
}

/* sticky knop */

.sticky-order{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
box-shadow:0 -6px 12px rgba(0,0,0,0.1);
display:none;
}

.btn-order{
width:100%;
padding:16px;
background:#c98a3a;
border:none;
border-radius:12px;
font-size:18px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* status scherm */

#coffee-status{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.coffee-card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:360px;
}

.ready{
font-size:50px;
}

.machine{
width:260px;
margin:auto;
}

.espresso-flow{
animation:espressoPour 3s infinite;
transform-origin:top;
}

.espresso-flow.right{
animation-delay:.15s;
}

@keyframes espressoPour{
0%{height:0}
40%{height:48px}
80%{height:48px}
100%{height:0}
}

.coffee-fill{
animation:cupFill 3s infinite;
}

@keyframes cupFill{
0%{height:0;y:175}
50%{height:16px;y:175}
80%{height:26px;y:165}
100%{height:0;y:175}
}

.crema-fill{
animation:crema 3s infinite;
}

@keyframes crema{
0%{height:0;y:173}
50%{height:4px;y:173}
80%{height:6px;y:169}
100%{height:0;y:173}
}

.steam{
opacity:0;
animation:steamRise 3s infinite;
}

.s1{animation-delay:.5s}
.s2{animation-delay:1s}

@keyframes steamRise{
0%{opacity:0;transform:translateY(10px)}
50%{opacity:.7}
100%{opacity:0;transform:translateY(-12px)}
}

.gauge-needle{
transform-origin:230px 75px;
animation:gauge 3s infinite;
}

@keyframes gauge{
0%{transform:rotate(-40deg)}
50%{transform:rotate(30deg)}
100%{transform:rotate(-40deg)}
}

</style>

</head>

<body>

<div id="name-screen">

<h2>Vul je naam in</h2>
<input id="customer-name">

<br><br>

<button id="next-btn">Start</button>

</div>

<div id="menu-screen">
<div class="grid" id="menu-grid"></div>
</div>

<div class="sticky-order" id="sticky-order">
<button id="order-btn" class="btn-order">☕ Bestellen</button>
</div>

<div id="coffee-status">

<div class="coffee-card" id="coffee-card">

<h2>Je koffie wordt gezet...</h2>

<div class="machine">

<svg viewBox="0 0 320 200">

<!-- machine body -->

<rect x="40" y="30" width="240" height="90" rx="8" fill="#dcdcdc"/>
<rect x="40" y="30" width="240" height="14" fill="#bfbfbf"/>

<!-- cup warmer -->

<rect x="60" y="20" width="200" height="10" fill="#999"/>

<!-- pressure gauge -->

<circle cx="230" cy="75" r="18" fill="white" stroke="#444" stroke-width="3"/>

<line class="gauge-needle"
x1="230"
y1="75"
x2="230"
y2="63"
stroke="#c98a3a"
stroke-width="3"/>

<!-- grouphead -->

<circle cx="160" cy="100" r="16" fill="#888"/>
<rect x="150" y="95" width="20" height="20" fill="#666"/>

<!-- portafilter -->

<rect x="135" y="118" width="50" height="8" rx="3" fill="#333"/>

<!-- handle -->

<rect x="175" y="120" width="50" height="6" rx="3" fill="#222"/>

<!-- spouts -->

<rect x="148" y="126" width="6" height="8" fill="#444"/>
<rect x="166" y="126" width="6" height="8" fill="#444"/>

<!-- espresso streams -->

<rect class="espresso-flow"
x="150"
y="134"
width="4"
height="0"
fill="#4a250a"/>

<rect class="espresso-flow right"
x="168"
y="134"
width="4"
height="0"
fill="#4a250a"/>

<!-- cup -->

<path
d="M120 160 L200 160 L190 185 L130 185 Z"
fill="white"
stroke="#444"
stroke-width="3"
/>

<!-- espresso -->

<rect
class="coffee-fill"
x="130"
y="175"
width="60"
height="0"
fill="#5a2d0c"
/>

<!-- crema -->

<rect
class="crema-fill"
x="130"
y="173"
width="60"
height="0"
fill="#c98a3a"
/>

<!-- steam -->

<path class="steam s1"
d="M150 150 C140 135 160 135 155 115"
stroke="#bbb"
stroke-width="3"
fill="none"/>

<path class="steam s2"
d="M175 150 C165 135 185 135 180 115"
stroke="#bbb"
stroke-width="3"
fill="none"/>

</svg>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain:"koffie-bestellen.firebaseapp.com",
databaseURL:"https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"koffie-bestellen",
storageBucket:"koffie-bestellen.firebasestorage.app",
messagingSenderId:"592791423506",
appId:"1:592791423506:web:b4901c0cd2cf9094b9e6cb"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let selectedCoffee=null;

const brewingHTML = document.getElementById("coffee-card").innerHTML;

/* menu */

function initMenu(){

const grid=document.getElementById("menu-grid");

onValue(ref(db,"products"),(snapshot)=>{

grid.innerHTML="";

snapshot.forEach(child=>{

const p=child.val();

if(!p.available) return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.img}">
<div>${p.name}</div>
<div class="card-options"></div>
`;

const options=card.querySelector(".card-options");

/* espresso */

if(p.name==="Espresso" || p.name==="Lungo"){

options.innerHTML+=`
<label>
<input type="checkbox" class="milk"> 🥛 Melk
</label>
`;

options.innerHTML+=`
<label>
<input type="checkbox" class="sugar"> 🧊 Suiker
</label>
`;

}

/* latte macchiato plain */

if(p.name==="Latte Macchiato"){

options.innerHTML+=`
<label>
<input type="checkbox" class="sugar"> 🧊 Suiker
</label>
`;

}

/* klik op kaart */

card.onclick=()=>{

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected");
});

card.classList.add("selected");

selectedCoffee=p.name;

document.getElementById("sticky-order").style.display="block";

document.getElementById("order-btn").innerText="☕ Bestel "+p.name;

};

/* checkbox klik blokkeren */

options.querySelectorAll("input").forEach(input=>{
input.addEventListener("click",(e)=>{
e.stopPropagation();
});
});

grid.appendChild(card);

});

});

}

/* bestelling */

function placeOrder(){

if(!selectedCoffee) return;

const card=document.querySelector(".card.selected");

const milk=card.querySelector(".milk")?.checked || false;
const sugar=card.querySelector(".sugar")?.checked || false;

showBrewing();

const orderRef=push(ref(db,"orders"),{

name:localStorage.getItem("customerName"),
coffee:selectedCoffee,
milk:milk,
sugar:sugar,
completed:false,
timestamp:Date.now()

});

listenForCompletion(orderRef.key);

}

function showBrewing(){

const card = document.getElementById("coffee-card");

/* reset koffiemachine animatie */

card.innerHTML = brewingHTML;

document.getElementById("coffee-status").style.display = "flex";

}

/* order listener */

function listenForCompletion(id){

const orderRef=ref(db,"orders/"+id);

let firstLoad=true;
let previousCompleted=false;

onValue(orderRef,(snap)=>{

const order=snap.val();

if(!order) return;

if(firstLoad){
previousCompleted=order.completed||false;
firstLoad=false;
return;
}

if(order.completed && !previousCompleted){
showReady();
}

previousCompleted=order.completed;

});

}

function showReady(){

const card=document.getElementById("coffee-card");

card.innerHTML=`
<div class="ready">✅</div>
<h2>Je koffie is klaar!</h2>
`;

setTimeout(()=>{

document.getElementById("coffee-status").style.display="none";

},3000);

}

/* start */

window.onload=()=>{

const saved=localStorage.getItem("customerName");

if(saved){

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

}

document.getElementById("next-btn").onclick=()=>{

localStorage.setItem("customerName",
document.getElementById("customer-name").value);

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

};

document.getElementById("order-btn").addEventListener("click",placeOrder);

};

</script>

</body>
</html>
