<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koffie Menu</title>

  <style>
    :root{
      --bg: #f6f1ec;
      --card: #ffffff;
      --text: #2f2a27;
      --muted: #7a6f67;
      --brand: #6d4c41;
      --brand-2: #8d6e63;
      --accent: #c98a3a;
      --accent-soft: rgba(201,138,58,0.10);
      --border: #eadfd6;
      --shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fffaf5 0%, transparent 35%),
        radial-gradient(circle at top right, #fff5ea 0%, transparent 30%),
        var(--bg);
    }

    /* Naam scherm */
    #name-screen{
      max-width: 420px;
      margin: 40px auto;
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    #name-screen h2{
      margin-top: 0;
      color: var(--brand);
    }

    #name-screen input{
      width: 80%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d6ccc5;
      margin: 12px 0;
      outline: none;
    }

    #name-screen input:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,138,58,0.12);
    }

    /* Menu */
    #menu-screen{
      max-width: 950px;
      margin: 20px auto 120px auto;
      display: none;
      padding: 0 12px;
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card{
      background: var(--card);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      text-align: center;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .card:hover{
      transform: translateY(-2px);
    }

    .card.selected{
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 12px 26px rgba(201,138,58,0.18);
    }

    .card img{
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      pointer-events: none;
    }

    .card span{
      display:block;
      font-weight:bold;
      margin-top:8px;
      line-height: 1.2;
      color: var(--brand);
      pointer-events: none;
      min-height: 38px;
    }

    /* Opties */
    .card-options{
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      padding-top: 10px;
      border-top: 1px dashed #e8ddd5;
    }

    .opt{
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #eadfd6;
      cursor: pointer;
      user-select: none;
    }

    .opt input{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* Buttons */
    .btn{
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: transform .1s ease, opacity .15s ease;
    }

    .btn:active{
      transform: scale(0.98);
    }

    .btn-primary{
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color:white;
    }

    .btn-order{
      background: linear-gradient(135deg, var(--accent), #dea14f);
      color:white;
      font-weight:bold;
      width:100%;
      font-size:18px;
      padding:16px;
      box-shadow: 0 10px 20px rgba(201,138,58,0.20);
    }

    /* Sticky bestelbar */
    .sticky-order{
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(246,241,236,0.94);
      backdrop-filter: blur(10px);
      padding: 14px 16px;
      box-shadow: 0 -10px 20px rgba(0,0,0,0.08);
      border-top: 1px solid #eadfd6;
      display: none;
      z-index: 90;
    }

    .sticky-inner{
      max-width: 950px;
      margin: auto;
      display: flex;
    }

    /* Bevestiging */
    #order-confirmation{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .confirm-card{
      background: #fff;
      padding: 34px 28px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.20);
      animation: pop .28s ease;
      max-width: 360px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .confirm-icon{
      font-size: 52px;
      margin-bottom: 8px;
      position: relative;
      display: inline-block;
    }

    .steam{
      position: absolute;
      top: -14px;
      left: 50%;
      width: 70px;
      height: 34px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .steam span{
      position: absolute;
      bottom: 0;
      width: 10px;
      height: 24px;
      border-radius: 999px;
      background: rgba(180,180,180,0.35);
      filter: blur(1px);
      animation: steamUp 1.8s infinite ease-in-out;
    }

    .steam span:nth-child(1){ left: 10px; animation-delay: 0s; }
    .steam span:nth-child(2){ left: 28px; animation-delay: .35s; }
    .steam span:nth-child(3){ left: 46px; animation-delay: .7s; }

    .confirm-card h2{
      margin: 8px 0 8px;
      color: var(--brand);
    }

    .confirm-card p{
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .confirm-ring{
      margin: 18px auto 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid #f0e4d7;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes pop{
      0%{ transform: scale(.85); opacity:0; }
      100%{ transform: scale(1); opacity:1; }
    }

    @keyframes steamUp{
      0%{ transform: translateY(0) scaleX(1); opacity: 0; }
      25%{ opacity: .55; }
      100%{ transform: translateY(-16px) scaleX(1.25); opacity: 0; }
    }

    @keyframes spin{
      to { transform: rotate(360deg); }
    }

    /* Tablet */
    @media (max-width: 900px){
      .grid{
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Mobiel */
    @media (max-width: 600px){
      #menu-screen{
        margin-bottom: 120px;
      }

      .grid{
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .card{
        padding: 14px;
      }

      .card img{
        width: 120px;
        height: 120px;
      }

      .card span{
        font-size: 15px;
        min-height: 36px;
      }

      .card-options{
        flex-direction: column;
        align-items: center;
      }

      .opt{
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 400px){
      .card img{
        width: 110px;
        height: 110px;
      }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
      authDomain: "koffie-bestellen.firebaseapp.com",
      databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "koffie-bestellen",
      storageBucket: "koffie-bestellen.firebasestorage.app",
      messagingSenderId: "592791423506",
      appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedCoffee = null;

    // Vul hier jouw thuislocatie in
    const HOME_LAT = 53.25327032716371;
    const HOME_LNG = 6.587397261441371;
    const ALLOWED_RADIUS_METERS = 100;

    function getDistance(lat1, lon1, lat2, lon2){
      const R = 6371000;
      const toRad = (v) => v * Math.PI / 180;

      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function checkLocation(){
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocatie niet ondersteund"));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            const distance = getDistance(userLat, userLng, HOME_LAT, HOME_LNG);

            resolve({
              allowed: distance <= ALLOWED_RADIUS_METERS,
              distance
            });
          },
          (error) => reject(error),
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      });
    }

    function showOptions(cardElement, coffeeName){
      const optionsDiv = document.createElement("div");
      optionsDiv.className = "card-options";

      const sugarIcon = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#ffffff" stroke="#d7ccc8" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="8" width="8" height="8" rx="2"/>
          <rect x="9" y="4" width="8" height="8" rx="2"/>
          <rect x="13" y="10" width="8" height="8" rx="2"/>
        </svg>
      `;

      if (
        coffeeName === "Espresso" ||
        coffeeName === "Long Black" ||
        coffeeName === "Lungo"
      ) {
        optionsDiv.innerHTML = `
          <label class="opt">
            <input type="checkbox" class="milk-checkbox">
            🥛 Melk
          </label>

          <label class="opt">
            <input type="checkbox" class="sugar-checkbox">
            ${sugarIcon} Suiker
          </label>
        `;
      } else if (coffeeName.includes("Latte Macchiato")) {
        optionsDiv.innerHTML = `
          <label class="opt">
            <input type="checkbox" class="sugar-checkbox">
            ${sugarIcon} Suiker
          </label>
        `;
      }

      optionsDiv.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("click", e => e.stopPropagation());
      });

      if (optionsDiv.innerHTML.trim() !== "") {
        cardElement.appendChild(optionsDiv);
      }
    }

    function playCoffeeSound(){
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.18);

        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.35);

        osc.onended = () => ctx.close().catch(() => {});
      } catch (e) {
        // stil falen
      }
    }

    function showConfirmation(coffee){
      const confirmBox = document.getElementById("order-confirmation");
      const confirmText = document.getElementById("confirm-text");

      confirmText.innerText = `${coffee} wordt voor je gemaakt`;
      confirmBox.style.display = "flex";

      playCoffeeSound();

      setTimeout(() => {
        confirmBox.style.display = "none";

        document.querySelectorAll(".card").forEach(c => {
          c.classList.remove("selected");
          c.querySelector(".card-options")?.remove();
        });

        selectedCoffee = null;
        document.getElementById("sticky-order").style.display = "none";
        document.getElementById("sticky-order-btn").innerHTML = "☕ Bestellen";
      }, 2000);
    }

    async function placeOrder(coffee){
      try {
        const locationCheck = await checkLocation();

        if (!locationCheck.allowed) {
          alert(
            "Bestellen kan alleen bij mij thuis.\nJe bent ongeveer " +
            Math.round(locationCheck.distance) +
            " meter verwijderd."
          );
          return;
        }
      } catch (error) {
        alert("Sta locatietoegang toe om te bestellen.");
        return;
      }

      const card = document.querySelector(".card.selected");
      const milk = card?.querySelector(".milk-checkbox")?.checked || false;
      const sugar = card?.querySelector(".sugar-checkbox")?.checked || false;

      const order = {
        name: localStorage.getItem("customerName"),
        coffee,
        milk,
        sugar,
        timestamp: Date.now()
      };

      await push(ref(db, "orders"), order);
      showConfirmation(coffee);
    }

    function initMenu(){
      const grid = document.getElementById("menu-grid");
      const productsRef = ref(db, "products");

      onValue(productsRef, (snapshot) => {
        grid.innerHTML = "";

        snapshot.forEach((child) => {
          const product = child.val();
          if (!product?.available) return;

          const card = document.createElement("div");
          card.className = "card";

          const img = document.createElement("img");
          img.src = product.img;
          img.alt = product.name || "Product";
          img.loading = "lazy";

          const name = document.createElement("span");
          name.innerText = product.name;

          card.appendChild(img);
          card.appendChild(name);

          card.onclick = (e) => {
            if (e.target.tagName === "INPUT") return;

            document.querySelectorAll(".card").forEach(c => {
              c.classList.remove("selected");
              c.querySelector(".card-options")?.remove();
            });

            card.classList.add("selected");
            selectedCoffee = product.name;

            showOptions(card, product.name);

            const stickyOrder = document.getElementById("sticky-order");
            const stickyBtn = document.getElementById("sticky-order-btn");

            stickyBtn.innerHTML = "☕ Bestel " + product.name;
            stickyOrder.style.display = "block";

            stickyBtn.onclick = () => {
              placeOrder(product.name);
            };
          };

          grid.appendChild(card);
        });
      });
    }

    window.onload = () => {
      const savedName = localStorage.getItem("customerName");

      if (savedName) {
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("menu-screen").style.display = "block";
        initMenu();
      }

      document.getElementById("next-btn").onclick = () => {
        const name = document.getElementById("customer-name").value.trim();

        if (!name) {
          alert("Vul eerst je naam in");
          return;
        }

        localStorage.setItem("customerName", name);
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("menu-screen").style.display = "block";
        initMenu();
      };

      document.getElementById("customer-name").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          document.getElementById("next-btn").click();
        }
      });
    };
  </script>
</head>

<body>
  <div id="name-screen">
    <h2>Vul je naam in</h2>
    <input id="customer-name" placeholder="Naam" />
    <br><br>
    <button class="btn btn-primary" id="next-btn">Volgende</button>
  </div>

  <div id="menu-screen">
    <div class="grid" id="menu-grid"></div>
  </div>

  <div class="sticky-order" id="sticky-order">
    <div class="sticky-inner">
      <button class="btn btn-order" id="sticky-order-btn">☕ Bestellen</button>
    </div>
  </div>

  <div id="order-confirmation">
    <div class="confirm-card">
      <div class="confirm-icon">
        ☕
        <div class="steam" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <h2>Bestelling geplaatst!</h2>
      <p id="confirm-text"></p>
      <div class="confirm-ring" aria-hidden="true"></div>
    </div>
  </div>
</body>
</html>
