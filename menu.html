<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Koffie Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0 15px;
    }

    /* Naam scherm */
    #name-screen {
      max-width: 400px;
      margin: 50px auto;
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    #name-screen input {
      width: 80%;
      padding: 10px;
      margin: 15px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #name-screen button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #6d4c41, #8d6e63);
      color: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      transition: all 0.25s ease;
    }

    #name-screen button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #name-screen button:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    /* Menu scherm */
    #menu-screen {
      max-width: 600px;
      margin: 20px auto;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .card span {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    /* Opties onder de kaart */
    .card-options {
      max-height: 0;
      overflow: hidden;
      padding-top: 0;
      border-top: 1px solid #eee;
      transition: max-height 0.5s ease-out, padding-top 0.5s ease-out;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .card.selected .card-options {
      max-height: 200px;
      padding-top: 10px;
    }

    .card-options label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    /* Checkboxes iets groter */
    .card-options input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    /* Bestelknop */
    #order-btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #6d4c41, #8d6e63);
      color: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      transition: all 0.25s ease;
      margin-top: 15px;
    }

    #order-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #order-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    /* Mobiel */
    @media (max-width: 600px) {
      .card {
        flex-direction: column;
        text-align: center;
      }

      .card img {
        width: 100%;
        height: 160px;
      }
    }
  </style>

    function initMenu() {
      const menuDiv = document.getElementById("menu-screen");
      menuDiv.innerHTML = "";  // Maak het menu leeg

      selectedCoffee = null;

      // Haal de producten uit Firebase
      const productsRef = ref(db, "products");
      onValue(productsRef, (snapshot) => {
        snapshot.forEach((childSnapshot) => {
          const product = childSnapshot.val();

          // Alleen beschikbare producten weergeven
          if (product.available) {
            const div = document.createElement("div");
            div.className = "card";

            const img = document.createElement("img");
            img.src = product.img;  // Voeg afbeelding toe
            div.appendChild(img);

            const span = document.createElement("span");
            span.textContent = product.name;  // Voeg productnaam toe
            div.appendChild(span);

              document.querySelectorAll(".card").forEach(c => {
                c.classList.remove("selected");
                const oldOptions = c.querySelector(".card-options");
                if (oldOptions) oldOptions.remove();
              });

              selectedCoffee = product.name;
              showOptions(div, product.name);
              
              // Maak de bestelknop zichtbaar wanneer een product wordt geselecteerd
              showOrderButton();
            };

            menuDiv.appendChild(div);  // Voeg het product toe aan het menu
          }
        });
      });
    }
