<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffie Bestellen</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f3ef; margin:0; padding:20px; }
h1,h2 { text-align:center; color:#3e2723; }
.container { max-width:500px; margin:auto; }
.card {
  display: flex;
  align-items: center;      /* verticale centrering */
  gap: 20px;
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 12px;
  flex-shrink: 0;
}

.card span {
  flex: 1;
  text-align: center;      /* horizontale centrering */
  font-size: 18px;
  font-weight: 600;
}

.card-options {
  margin-top: 15px;
  padding-top: 10px;
  border-top: 1px solid #eee;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-options label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
}

.selected {
  border: 3px solid #6d4c41;
}

/* 📱 Mobiel: onder elkaar */
@media (max-width: 600px) {
  .card {
    flex-direction: column;
    text-align: center;
  }

  .card img {
    width: 100%;
    height: 160px;
  }
}

/* 🎯 Mooie bestelknop */
#order-btn {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  cursor: pointer;

  background: linear-gradient(135deg, #6d4c41, #8d6e63);
  color: white;

  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  transition: all 0.25s ease;
}

#order-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

#order-btn:active {
  transform: scale(0.97);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
</style>
</head>
<body>

<div id="name-container">
  <h2>Welkom! Vul eerst je naam in:</h2>
  <input type="text" id="customer-name" placeholder="Je naam">
  <button id="name-next-btn">Volgende</button>
</div>

<div id="menu-container" style="display:none;">
  <h1>☕ Koffie Menu</h1>
  <div class="container" id="menu"></div>
  <button id="order-btn">☕ Bestelling plaatsen</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// --- Firebase config invullen ---
const firebaseConfig = {
  apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
  authDomain: "koffie-bestellen.firebaseapp.com",
  databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "koffie-bestellen"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- Variabelen ---
let customerName = null;
let selectedCoffee = null;

const coffees = [
  { name: "Espresso", img: "espresso.jpg" },
  { name: "Long Black", img: "longblack.jpg" },
  { name: "Latte Macchiato", img: "lattemacchiato.jpg" },
  { name: "Latte Macchiato + Pumpkin Spice", img: "pumpkinspice.jpg" },
  { name: "Latte Macchiato + Vanille", img: "vanille.jpg" },
  { name: "Latte Macchiato + Caramel", img: "caramel.jpg" },
  { name: "Thee", img: "thee.jpg" }
];

// --- Elementen ---
const menuDiv = document.getElementById("menu");
const optionsDiv = document.getElementById("options");
const nameContainer = document.getElementById("name-container");
const menuContainer = document.getElementById("menu-container");

// --- Functie: menu bouwen ---
function initMenu() {
  menuDiv.innerHTML = "";
  selectedCoffee = null;

  coffees.forEach(coffee => {
    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");
    img.src = coffee.img;
    div.appendChild(img);

    const span = document.createElement("span");
    span.textContent = coffee.name;
    div.appendChild(span);

    div.onclick = () => {
      // Verwijder eerdere selectie + opties
      document.querySelectorAll(".card").forEach(c => {
        c.classList.remove("selected");
        const oldOptions = c.querySelector(".card-options");
        if (oldOptions) oldOptions.remove();
      });

      div.classList.add("selected");
      selectedCoffee = coffee.name;

      showOptions(div, coffee.name);
    };

    menuDiv.appendChild(div);
  });
}

// --- Functie: opties tonen ---
function showOptions(cardElement, coffeeName) {
  const optionsDiv = document.createElement("div");
  optionsDiv.className = "card-options";

  const sugarIcon = `
  <svg width="22" height="22" viewBox="0 0 24 24">
    <rect x="3" y="8" width="8" height="8" rx="2"
      fill="#ffffff" stroke="#d7ccc8" stroke-width="1.5"/>
    <rect x="9" y="4" width="8" height="8" rx="2"
      fill="#ffffff" stroke="#d7ccc8" stroke-width="1.5"/>
    <rect x="13" y="10" width="8" height="8" rx="2"
      fill="#ffffff" stroke="#d7ccc8" stroke-width="1.5"/>
  </svg>
`;

  if (coffeeName === "Espresso" || coffeeName === "Long Black") {
  optionsDiv.innerHTML = `
    <label><input type="checkbox" class="milk-checkbox"> 🥛 Melk</label>
    <label><input type="checkbox" class="sugar-checkbox"> ${sugarIcon} Suiker</label>
  `;
} else if (coffeeName.includes("Latte")) {
  optionsDiv.innerHTML = `
    <label><input type="checkbox" class="sugar-checkbox"> ${sugarIcon} Suiker</label>
  `;
}

// Stop click event op checkboxes van “bubbelen” naar de kaart
optionsDiv.querySelectorAll("input[type='checkbox']").forEach(cb => {
  cb.addEventListener("click", (e) => e.stopPropagation());
});
// --- Check of naam al is opgeslagen ---
window.addEventListener("DOMContentLoaded", () => {
  const storedName = localStorage.getItem("customerName");
  if (storedName) {
    customerName = storedName;
    nameContainer.style.display = "none";
    menuContainer.style.display = "block";
    initMenu();
  }
});

// --- Naam opslaan en menu tonen ---
document.getElementById("name-next-btn").onclick = () => {
  const nameInput = document.getElementById("customer-name").value.trim();
  if (!nameInput) { alert("Vul je naam in 😃"); return; }
  customerName = nameInput;
  localStorage.setItem("customerName", customerName);
  document.getElementById("name-screen").style.display = "none";
  document.getElementById("menu-screen").style.display = "block";
  initMenu();
});

// --- Naam wijzigen ---
// document.getElementById("change-name-btn").addEventListener("click", () => {
//  localStorage.removeItem("customerName");
//  location.reload();
// });

// --- Bestelling plaatsen ---
document.getElementById("order-btn").addEventListener("click", () => {
  if (!customerName) { alert("Vul eerst je naam in!"); return; }
  if (!selectedCoffee) { alert("Kies eerst een koffie ☕"); return; }

  const milk = document.getElementById("milk")?.checked || false;
  const sugar = document.getElementById("sugar")?.checked || false;

  console.log("Plaats bestelling:", customerName, selectedCoffee, milk, sugar);

  push(ref(db, "orders"), {
    name: customerName,
    coffee: selectedCoffee,
    milk: milk,
    sugar: sugar,
    time: new Date().toLocaleTimeString(),
    status: "nieuw"
  })
  .then(() => {
    alert(`Bestelling geplaatst, ${customerName}!`);
    location.reload();
  })
  .catch((err) => alert("Fout bij plaatsen bestelling: " + err));
});
</script>

</body>
</html>
