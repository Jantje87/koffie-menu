<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koffie Menu</title>

<style>

body{
font-family:Arial;
background:#f6f1ec;
margin:0;
padding:0;
}

/* naam scherm */

#name-screen{
max-width:400px;
margin:60px auto;
background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

#name-screen input{
width:80%;
padding:10px;
margin-top:15px;
}

#menu-screen{
max-width:900px;
margin:auto;
padding:20px;
display:none;
}

/* product grid */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:white;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card.selected{
border:3px solid #c98a3a;
}

/* opties */

.card-options{
margin-top:8px;
}

/* sticky bestelknop */

.sticky-order{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
display:none;
box-shadow:0 -6px 12px rgba(0,0,0,0.1);
}

.btn-order{
width:100%;
padding:16px;
background:#c98a3a;
border:none;
border-radius:12px;
font-size:18px;
color:white;
font-weight:bold;
}

/* koffie status scherm */

#coffee-status{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.coffee-card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
}

/* SVG koffiemachine */

.machine{
width:200px;
margin:auto;
}

/* espresso straal */

.coffee-flow{
animation:pour 2s infinite;
transform-origin:top;
}

@keyframes pour{

0%{height:0}

40%{height:35px}

80%{height:35px}

100%{height:0}

}

/* kopje vullen */

.coffee-fill{
animation:fill 2s infinite;
}

@keyframes fill{

0%{
height:0;
y:120;
}

50%{
height:12px;
y:120;
}

80%{
height:20px;
y:112;
}

100%{
height:0;
y:120;
}

}

/* stoom */

.steam{
opacity:0;
animation:steam 2s infinite;
}

@keyframes steam{

0%{
opacity:0;
transform:translateY(8px);
}

50%{
opacity:0.7;
}

100%{
opacity:0;
transform:translateY(-8px);
}

}

.ready{
font-size:50px;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue
}

from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain:"koffie-bestellen.firebaseapp.com",
databaseURL:"https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"koffie-bestellen",
storageBucket:"koffie-bestellen.firebasestorage.app",
messagingSenderId:"592791423506",
appId:"1:592791423506:web:b4901c0cd2cf9094b9e6cb"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let selectedCoffee=null;

/* menu laden */

function initMenu(){

const grid=document.getElementById("menu-grid");

const productsRef=ref(db,"products");

onValue(productsRef,(snapshot)=>{

grid.innerHTML="";

snapshot.forEach(child=>{

const p=child.val();

if(!p.available) return;

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=p.img;

const name=document.createElement("div");
name.innerText=p.name;

card.appendChild(img);
card.appendChild(name);

card.onclick=()=>{

document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));

card.classList.add("selected");

selectedCoffee=p.name;

document.getElementById("sticky-order").style.display="block";

document.getElementById("order-btn").innerText="☕ Bestel "+p.name;

};

grid.appendChild(card);

});

});

}

/* bestelling */

function placeOrder(){

const name=localStorage.getItem("customerName");

push(ref(db,"orders"),{

name:name,
coffee:selectedCoffee,
milk:false,
sugar:false,
completed:false,
timestamp:Date.now()

});

showBrewing();

}

/* animatie tonen */

function showBrewing(){

const screen=document.getElementById("coffee-status");

screen.style.display="flex";

}

/* status luisteren */

function listenOrders(){

const ordersRef=ref(db,"orders");

onValue(ordersRef,(snapshot)=>{

snapshot.forEach(child=>{

const order=child.val();

if(order.name===localStorage.getItem("customerName") && order.completed){

showReady();

}

});

});

}

/* koffie klaar */

function showReady(){

const card=document.querySelector(".coffee-card");

card.innerHTML=`

<div class="ready">✅</div>

<h2>Je koffie is klaar!</h2>

`;

setTimeout(()=>{

document.getElementById("coffee-status").style.display="none";

},3000);

}

/* naam scherm */

window.onload=()=>{

const saved=localStorage.getItem("customerName");

if(saved){

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();
listenOrders();

}

document.getElementById("next-btn").onclick=()=>{

const name=document.getElementById("customer-name").value;

localStorage.setItem("customerName",name);

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();
listenOrders();

};

};

</script>

</head>

<body>

<div id="name-screen">

<h2>Vul je naam in</h2>

<input id="customer-name">

<br><br>

<button id="next-btn">Start</button>

</div>

<div id="menu-screen">

<div class="grid" id="menu-grid"></div>

</div>

<div class="sticky-order" id="sticky-order">

<button id="order-btn" class="btn-order" onclick="placeOrder()">
☕ Bestellen
</button>

</div>

<div id="coffee-status">

<div class="coffee-card">

<h2>Je koffie wordt gezet...</h2>

<div class="machine">

<svg viewBox="0 0 200 150">

<rect x="30" y="20" width="140" height="60" rx="8" fill="#d8d8d8"/>

<rect x="30" y="20" width="140" height="10" fill="#bdbdbd"/>

<rect x="90" y="60" width="20" height="10" fill="#444"/>

<rect x="85" y="70" width="30" height="6" fill="#333"/>

<rect class="coffee-flow" x="98" y="76" width="4" height="0" fill="#5a2d0c"/>

<path d="M80 120 L120 120 L115 140 L85 140 Z"
fill="white"
stroke="#444"
stroke-width="2"/>

<rect class="coffee-fill" x="85" y="130" width="30" height="0" fill="#6b3a12"/>

<path class="steam"
d="M95 110 C90 95 105 95 100 80"
stroke="#bbb"
stroke-width="3"
fill="none"/>

</svg>

</div>

</div>

</div>

</body>
</html>
