<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffie Bestellen</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f3ef; margin:0; padding:20px; }
h1,h2 { text-align:center; color:#3e2723; }
.container { max-width:500px; margin:auto; }
.card { background:white; border-radius:15px; padding:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); cursor:pointer; transition:0.2s; }
.card:hover { transform:scale(1.03); }
.selected { border:3px solid #6d4c41; }
button { width:100%; padding:15px; background:#6d4c41; color:white; border:none; border-radius:10px; font-size:16px; margin-top:15px; }
#options label { display:block; margin-top:5px; font-size:14px; }
.card img { width:100%; height:150px; object-fit:cover; border-radius:10px; margin-bottom:10px; }
</style>
</head>
<body>

<div id="name-container">
  <h2>Welkom! Vul eerst je naam in:</h2>
  <input type="text" id="customer-name" placeholder="Je naam">
  <button id="name-next-btn">Volgende</button>
</div>

<div id="menu-container" style="display:none;">
  <h1>☕ Koffie Menu</h1>
  <div class="container" id="menu"></div>
  <div id="options"></div>
  <button id="order-btn">Bestelling bevestigen</button>
  <button id="change-name-btn" style="margin-top:10px; background:#a1887f;">Andere naam invullen</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// --- Firebase config ---
const firebaseConfig = {
   apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
  authDomain: "koffie-bestellen.firebaseapp.com",
  databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "koffie-bestellen",
  storageBucket: "koffie-bestellen.firebasestorage.app",
  messagingSenderId: "592791423506",
  appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- Variabelen ---
let customerName = null;
let selectedCoffee = null;

const coffees = [
  { name: "Espresso", img: "espresso.jpg" },
  { name: "Long Black", img: "longblack.jpg" },
  { name: "Latte Macchiato", img: "lattemacchiato.jpg" },
  { name: "Latte Macchiato + Pumpkin Spice", img: "pumpkinspice.jpg" },
  { name: "Latte Macchiato + Vanille", img: "vanille.jpg" },
  { name: "Latte Macchiato + Caramel", img: "caramel.jpg" }
];

// --- Elementen ---
const menuDiv = document.getElementById("menu");
const optionsDiv = document.getElementById("options");
const nameContainer = document.getElementById("name-container");
const menuContainer = document.getElementById("menu-container");

// --- Functie: menu bouwen ---
function initMenu() {
  menuDiv.innerHTML = "";
  selectedCoffee = null;
  optionsDiv.innerHTML = "";

  coffees.forEach(coffee => {
    const div = document.createElement("div");
    div.className = "card";

    // Afbeelding
    const img = document.createElement("img");
    img.src = coffee.img; // pad of URL
    div.appendChild(img);

    // Naam
    const span = document.createElement("span");
    span.textContent = coffee.name;
    div.appendChild(span);

    // Klik selectie
    div.onclick = () => {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
      div.classList.add("selected");
      selectedCoffee = coffee.name;
      showOptions(coffee.name);
    };

    menuDiv.appendChild(div);
  });
}

// --- Functie: opties tonen ---
function showOptions(coffeeName) {
  optionsDiv.innerHTML = "";

  if (coffeeName === "Espresso" || coffeeName === "Long Black") {
    optionsDiv.innerHTML += `
      <label><input type="checkbox" id="milk"> Melk</label>
      <label><input type="checkbox" id="sugar"> Suiker</label>
    `;
  } else if (coffeeName.includes("Latte")) {
    optionsDiv.innerHTML += `<label><input type="checkbox" id="sugar"> Suiker</label>`;
  }
}

// --- Check of naam al is opgeslagen ---
window.addEventListener("DOMContentLoaded", () => {
  const storedName = localStorage.getItem("customerName");
  if (storedName) {
    customerName = storedName;
    nameContainer.style.display = "none";
    menuContainer.style.display = "block";
    initMenu();
  }
});

// --- Naam opslaan en menu tonen ---
document.getElementById("name-next-btn").addEventListener("click", () => {
  const nameInput = document.getElementById("customer-name").value.trim();
  if (!nameInput) { alert("Vul je naam in 😃"); return; }
  customerName = nameInput;
  localStorage.setItem("customerName", customerName);
  nameContainer.style.display = "none";
  menuContainer.style.display = "block";
  initMenu();
});

// --- Naam wijzigen ---
document.getElementById("change-name-btn").addEventListener("click", () => {
  localStorage.removeItem("customerName");
  location.reload();
});

// --- Bestelling plaatsen ---
document.getElementById("order-btn").addEventListener("click", () => {
  if (!customerName) { alert("Vul eerst je naam in!"); return; }
  if (!selectedCoffee) { alert("Kies eerst een koffie ☕"); return; }

  const milk = document.getElementById("milk")?.checked || false;
  const sugar = document.getElementById("sugar")?.checked || false;

  push(ref(db, "orders"), {
    name: customerName,
    coffee: selectedCoffee,
    milk: milk,
    sugar: sugar,
    time: new Date().toLocaleTimeString(),
    status: "nieuw"
  });

  alert(`Bestelling geplaatst, ${customerName}!`);
  location.reload();
});
</script>

</body>
</html>
