<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koffie Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    /* Naam scherm */
    #name-screen {
      max-width: 400px;
      margin: 50px auto;
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    #name-screen input {
      width: 80%;
      padding: 10px;
      margin: 15px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #name-screen button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #6d4c41, #8d6e63);
      color: white;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      transition: all 0.25s ease;
    }

    #name-screen button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    #name-screen button:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    /* Menu scherm */
    #menu-screen {
      max-width: 600px;
      margin: 20px auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .card span {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    /* Opties onder de kaart */
    .card-options {
      max-height: 0;
      overflow: hidden;
      padding-top: 0;
      border-top: 1px solid #eee;
      transition: max-height 0.5s ease-out, padding-top 0.5s ease-out;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .card.selected .card-options {
      max-height: 200px;
      padding-top: 10px;
    }

    .card-options label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    /* Checkboxes iets groter */
    .card-options input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    /* Bestelknop */
    #order-btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #6d4c41, #8d6e63);
      color: white;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      transition: all 0.25s ease;
      margin-top: 15px;
    }

    #order-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    #order-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    /* Responsive design for mobile */
    @media (max-width: 600px) {
      .card {
        flex-direction: column;
        text-align: center;
        padding: 10px;
      }

      .card img {
        width: 100%;
        height: auto;
        max-width: 150px;
      }

      #name-screen {
        width: 90%;
        margin: 20px auto;
      }

      #menu-screen {
        padding: 10px;
      }

      #order-btn {
        font-size: 16px;
      }
    }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
      authDomain: "koffie-bestellen.firebaseapp.com",
      databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "koffie-bestellen",
      storageBucket: "koffie-bestellen.firebasestorage.app",
      messagingSenderId: "592791423506",
      appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedCoffee = null;

  
    // Initialize menu screen
    function initMenu() {
      const menuDiv = document.getElementById("menu-screen");
      menuDiv.innerHTML = "";  // Clear the menu

      selectedCoffee = null;

      // Fetch products from Firebase
      const productsRef = ref(db, "products");
      onValue(productsRef, (snapshot) => {
        snapshot.forEach((childSnapshot) => {
          const product = childSnapshot.val();

          // Only display available products
          if (product.available) {
            const div = document.createElement("div");
            div.className = "card";

            const img = document.createElement("img");
            img.src = product.img;  // Add image
            div.appendChild(img);

            const span = document.createElement("span");
            span.textContent = product.name;  // Add product name
            div.appendChild(span);

            div.onclick = () => {
              document.querySelectorAll(".card").forEach(c => {
                c.classList.remove("selected");
                const oldOptions = c.querySelector(".card-options");
                if (oldOptions) oldOptions.remove();
              });

              div.classList.add("selected");
              selectedCoffee = product.name;
              showOptions(div, product.name);
              showOrderButton();  // Show order button
            };

            menuDiv.appendChild(div);  // Add product to menu
          }
        });
      });
    }

    // Function to show order button
    function showOrderButton() {
      const orderButton = document.getElementById("order-btn");
      if (orderButton) {
        orderButton.style.display = "block";  // Make the button visible
      }
    }

    // Show options for coffee (e.g., milk, sugar)
    function showOptions(cardElement, coffeeName) {
      const optionsDiv = document.createElement("div");
      optionsDiv.className = "card-options";

      const sugarIcon = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#ffffff" stroke="#d7ccc8" stroke-width="1.5">
          <rect x="3" y="8" width="8" height="8" rx="2"/>
          <rect x="9" y="4" width="8" height="8" rx="2"/>
          <rect x="13" y="10" width="8" height="8" rx="2"/>
        </svg>
      `;

      if (coffeeName === "Espresso" || coffeeName === "Lungo") {
        optionsDiv.innerHTML = `
          <label><input type="checkbox" class="milk-checkbox"> 🥛 Melk</label>
          <label><input type="checkbox" class="sugar-checkbox"> ${sugarIcon} Suiker</label>
        `;
      } else if (coffeeName.includes("Latte Macchiato")) {
        optionsDiv.innerHTML = `
          <label><input type="checkbox" class="sugar-checkbox"> ${sugarIcon} Suiker</label>
        `;
      }

      // Stop bubbelen zodat checkboxes werken
      optionsDiv.querySelectorAll("input[type='checkbox']").forEach(cb => {
        cb.addEventListener("click", (e) => e.stopPropagation());
      });

      cardElement.appendChild(optionsDiv);

      setTimeout(() => {
        cardElement.classList.add("selected");
      }, 10);
    }

    // Naam invoer scherm
    document.getElementById("next-btn").onclick = () => {
      const nameInput = document.getElementById("customer-name").value.trim();
      if (!nameInput) {
        alert("Vul eerst je naam in!");
        return;
      }
      localStorage.setItem("customerName", nameInput);
      document.getElementById("name-screen").style.display = "none";
      document.getElementById("menu-screen").style.display = "block";
      initMenu();
    };

    // Bestelknop
    document.getElementById("order-btn").onclick = () => {
      if (!selectedCoffee) {
        alert("Selecteer eerst een koffie");
        return;
      }

      const selectedCard = document.querySelector(".card.selected");
      if (!selectedCard) return;

      const milk = selectedCard.querySelector(".milk-checkbox")?.checked || false;
      const sugar = selectedCard.querySelector(".sugar-checkbox")?.checked || false;

      const order = {
        name: localStorage.getItem("customerName"),
        coffee: selectedCoffee,
        milk: milk,
        sugar: sugar,
        time: new Date().toLocaleTimeString()
      };

      push(ref(db, "orders"), order);
      alert("Bestelling geplaatst! ✅");
	  
      // Verberg de bestelknop na het plaatsen van de bestelling
      const orderButton = document.getElementById("order-btn");
      if (orderButton) {
        orderButton.style.display = "none";  // Verberg de knop
      }
    };
  </script>
</head>

<body>
  <!-- Naam scherm -->
  <div id="name-screen">
    <h2>Vul je naam in</h2>
    <input type="text" id="customer-name" placeholder="Naam">
    <button id="next-btn">Volgende</button>
  </div>

  <!-- Menu scherm -->
  <div id="menu-screen" style="display:none;">
    <!-- Menu wordt hier dynamisch geladen -->
    <button id="order-btn" style="display:none;">☕ Bestelling plaatsen</button>
  </div>
</body>

</html>
