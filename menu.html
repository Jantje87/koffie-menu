<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koffie Menu</title>

<style>

body{
font-family:Arial;
background:#f6f1ec;
margin:0;
}

/* naam scherm */

#name-screen{
max-width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

#name-screen input{
width:80%;
padding:12px;
margin-top:15px;
}

/* menu */

#menu-screen{
max-width:900px;
margin:auto;
padding:20px;
padding-bottom:140px;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:white;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card.selected{
border:3px solid #c98a3a;
}

.card-options{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px;
font-size:14px;
}

/* sticky knop */

.sticky-order{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
box-shadow:0 -6px 12px rgba(0,0,0,0.1);
display:none;
}

.btn-order{
width:100%;
padding:16px;
background:#c98a3a;
border:none;
border-radius:12px;
font-size:18px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* status scherm */

#coffee-status{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.coffee-card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:360px;
}

.ready{
font-size:50px;
}

</style>

</head>

<body>

<div id="name-screen">

<h2>Vul je naam in</h2>
<input id="customer-name">

<br><br>

<button id="next-btn">Start</button>

</div>

<div id="menu-screen">

<div class="grid" id="menu-grid"></div>

</div>

<div class="sticky-order" id="sticky-order">

<button id="order-btn" class="btn-order">
☕ Bestellen
</button>

</div>

<div id="coffee-status">

<div class="coffee-card" id="coffee-card">

<h2>Je koffie wordt gezet...</h2>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain:"koffie-bestellen.firebaseapp.com",
databaseURL:"https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"koffie-bestellen",
storageBucket:"koffie-bestellen.firebasestorage.app",
messagingSenderId:"592791423506",
appId:"1:592791423506:web:b4901c0cd2cf9094b9e6cb"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let selectedCoffee=null;

/* menu */

function initMenu(){

const grid=document.getElementById("menu-grid");

onValue(ref(db,"products"),(snapshot)=>{

grid.innerHTML="";

snapshot.forEach(child=>{

const p=child.val();

if(!p.available) return;

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=p.img;

const name=document.createElement("div");
name.innerText=p.name;

card.appendChild(img);
card.appendChild(name);

const options=document.createElement("div");
options.className="card-options";

if(p.name==="Espresso" || p.name==="Lungo"){

options.innerHTML+=`
<label>
<input type="checkbox" class="milk"> 🥛 Melk
</label>
`;

options.innerHTML+=`
<label>
<input type="checkbox" class="sugar"> 🧊 Suiker
</label>
`;

}

if(p.name.includes("Latte")){

options.innerHTML+=`
<label>
<input type="checkbox" class="sugar"> 🧊 Suiker
</label>
`;

}

card.appendChild(options);

card.onclick=()=>{

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected");
});

card.classList.add("selected");

selectedCoffee=p.name;

document.getElementById("sticky-order").style.display="block";

document.getElementById("order-btn").innerText="☕ Bestel "+p.name;

};

options.querySelectorAll("input").forEach(input=>{
input.addEventListener("click",(e)=>{
e.stopPropagation();
});
});

grid.appendChild(card);

});

});

}

/* bestelling */

function placeOrder(){

if(!selectedCoffee) return;

const card=document.querySelector(".card.selected");

const milk=card.querySelector(".milk")?.checked || false;
const sugar=card.querySelector(".sugar")?.checked || false;

showBrewing();

const orderRef=push(ref(db,"orders"),{

name:localStorage.getItem("customerName"),
coffee:selectedCoffee,
milk:milk,
sugar:sugar,
completed:false,
timestamp:Date.now()

});

listenForCompletion(orderRef.key);

}

function showBrewing(){

document.getElementById("coffee-status").style.display="flex";

}

/* luisteren naar order */

function listenForCompletion(id){

const orderRef=ref(db,"orders/"+id);

let firstLoad=true;
let previousCompleted=false;

onValue(orderRef,(snap)=>{

const order=snap.val();

if(!order) return;

if(firstLoad){
previousCompleted=order.completed || false;
firstLoad=false;
return;
}

if(order.completed && !previousCompleted){
showReady();
}

previousCompleted=order.completed;

});

}

function showReady(){

const card=document.getElementById("coffee-card");

card.innerHTML=`
<div class="ready">✅</div>
<h2>Je koffie is klaar!</h2>
`;

setTimeout(()=>{

document.getElementById("coffee-status").style.display="none";

},3000);

}

/* start */

window.onload=()=>{

const saved=localStorage.getItem("customerName");

if(saved){

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

}

document.getElementById("next-btn").onclick=()=>{

localStorage.setItem("customerName",
document.getElementById("customer-name").value);

document.getElementById("name-screen").style.display="none";
document.getElementById("menu-screen").style.display="block";

initMenu();

};

document.getElementById("order-btn").addEventListener("click",placeOrder);

};

</script>

</body>
</html>
