<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koffie Admin</title>

<style>

body{
font-family:Arial;
background:#f6f4f2;
margin:0;
padding:20px;
}

h1{
color:#6d4c41;
}

.container{
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:16px;
}

.panel{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

.item{
border:1px solid #eee;
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

.product-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.product-left{
display:flex;
align-items:center;
gap:10px;
}

.product-img{
width:40px;
height:40px;
object-fit:cover;
border-radius:10px;
}

.order-top{
display:flex;
justify-content:space-between;
}

.order-main{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.order-img{
width:36px;
height:36px;
border-radius:10px;
object-fit:cover;
}

.chips{
margin-top:6px;
display:flex;
gap:6px;
}

.chip{
font-size:12px;
padding:4px 8px;
border-radius:20px;
background:#eee;
}

.chip.on{
background:#dff5e6;
color:#1f8a4c;
}

.chip.off{
background:#f5e9e4;
color:#6d4c41;
}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-brand{
background:#6d4c41;
color:white;
}

.btn-ok{
background:#1f8a4c;
color:white;
}

.btn-danger{
background:#d32f2f;
color:white;
}

.is-completed{
opacity:0.7;
text-decoration:line-through;
}

.is-new{
background:#fff8e1;
border-color:#ffd54f;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove,
query,
orderByChild
}

from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain:"koffie-bestellen.firebaseapp.com",
databaseURL:"https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"koffie-bestellen",
storageBucket:"koffie-bestellen.firebasestorage.app",
messagingSenderId:"592791423506",
appId:"1:592791423506:web:b4901c0cd2cf9094b9e6cb"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let productImages={};
const seenOrderKeys=new Set();

function beep(){

try{

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.frequency.value=880;

osc.connect(gain);
gain.connect(ctx.destination);

gain.gain.setValueAtTime(0.001,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.2,ctx.currentTime+0.01);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);

osc.start();
osc.stop(ctx.currentTime+0.21);

}catch(e){}

}

function makeImg(className,src){

const img=document.createElement("img");

img.className=className;
img.src=src||"";
img.loading="lazy";

img.onerror=()=>img.style.display="none";

return img;

}

const productList=document.getElementById("product-list");
const orderList=document.getElementById("order-list");

const productsRef=ref(db,"products");

onValue(productsRef,(snapshot)=>{

productList.innerHTML="";
productImages={};

snapshot.forEach(child=>{

const product=child.val();
const key=child.key;

productImages[product.name]=product.img||"";

const item=document.createElement("div");
item.className="item";

const row=document.createElement("div");
row.className="product-row";

const left=document.createElement("div");
left.className="product-left";

const img=makeImg("product-img",product.img);

const name=document.createElement("div");
name.innerText=product.name;

left.appendChild(img);
left.appendChild(name);

const btn=document.createElement("button");
btn.className="btn btn-brand";
btn.innerText=product.available?"Verwijder":"Herstel";

btn.onclick=()=>{

update(ref(db,"products/"+key),{
available:!product.available
});

};

row.appendChild(left);
row.appendChild(btn);

item.appendChild(row);

productList.appendChild(item);

});

});

const ordersRef=ref(db,"orders");
const ordersQuery=query(ordersRef,orderByChild("timestamp"));

onValue(ordersQuery,(snapshot)=>{

orderList.innerHTML="";

let orders=[];

snapshot.forEach(child=>{

orders.push({
...child.val(),
key:child.key
});

});

orders.reverse();

let newOrders=0;

orders.forEach(order=>{

const isNew=!seenOrderKeys.has(order.key);

seenOrderKeys.add(order.key);

const item=document.createElement("div");
item.className="item";

if(order.completed) item.classList.add("is-completed");

if(isNew && !order.completed){

item.classList.add("is-new");
newOrders++;

}

const top=document.createElement("div");
top.className="order-top";

const main=document.createElement("div");
main.className="order-main";

const img=makeImg("order-img",productImages[order.coffee]);

const text=document.createElement("span");
text.innerText=order.name+" — "+order.coffee;

main.appendChild(img);
main.appendChild(text);

const time=document.createElement("div");
time.innerText=new Date(order.timestamp).toLocaleTimeString();

top.appendChild(main);
top.appendChild(time);

const chips=document.createElement("div");
chips.className="chips";

const milk=document.createElement("span");
milk.className="chip "+(order.milk?"on":"off");
milk.innerText="Melk";

const sugar=document.createElement("span");
sugar.className="chip "+(order.sugar?"on":"off");
sugar.innerText="Suiker";

chips.appendChild(milk);
chips.appendChild(sugar);

const actions=document.createElement("div");

const btn=document.createElement("button");
btn.className="btn btn-ok";

if(order.completed){

btn.innerText="☕ Klaar";
btn.disabled=true;

}else{

btn.innerText="☕ Markeer als klaar";

btn.onclick=()=>{

update(ref(db,"orders/"+order.key),{
completed:true
});

};

}

actions.appendChild(btn);

item.appendChild(top);
item.appendChild(chips);
item.appendChild(actions);

orderList.appendChild(item);

});

if(newOrders>0) beep();

});

document.getElementById("clear-orders-btn").onclick=()=>{

if(!confirm("Alle bestellingen verwijderen?")) return;

remove(ref(db,"orders"));

};

</script>

</head>

<body>

<div class="container">

<h1>Koffie Dashboard</h1>

<div class="grid">

<div class="panel">

<h2>Producten</h2>

<div id="product-list"></div>

</div>

<div class="panel">

<h2>Bestellingen</h2>

<button id="clear-orders-btn" class="btn btn-danger">
Wis alle bestellingen
</button>

<div id="order-list"></div>

</div>

</div>

</div>

</body>
</html>
