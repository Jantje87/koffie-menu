<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Koffie Dashboard</title>

<style>

body{
font-family:Arial;
background:#f6f1ec;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#6d4c41;
}

.order-list{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.order{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
gap:10px;
}

.order img{
width:60px;
height:60px;
object-fit:contain;
}

.order-info{
flex:1;
}

.order-title{
font-weight:bold;
font-size:16px;
}

.order-details{
font-size:14px;
color:#666;
}

.order-status{
font-size:13px;
font-weight:bold;
margin-top:3px;
}

.pending{
color:#c98a3a;
}

.done{
color:#4CAF50;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.complete-btn{
background:#4CAF50;
color:white;
}

.complete-btn:hover{
background:#43a047;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, update, query, orderByChild } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain: "koffie-bestellen.firebaseapp.com",
databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "koffie-bestellen",
storageBucket: "koffie-bestellen.firebasestorage.app",
messagingSenderId: "592791423506",
appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const orderList = document.getElementById("order-list");

const ordersRef = ref(db,"orders");
const ordersQuery = query(ordersRef, orderByChild("timestamp"));

onValue(ordersQuery,(snapshot)=>{

orderList.innerHTML="";

let orders=[];

snapshot.forEach(child=>{

orders.push({
...child.val(),
key:child.key
});

});

orders.reverse();

orders.forEach(order=>{

const div=document.createElement("div");
div.className="order";

const img=document.createElement("img");
img.src=getProductImage(order.coffee);

div.appendChild(img);

const info=document.createElement("div");
info.className="order-info";

const title=document.createElement("div");
title.className="order-title";
title.innerText=order.name+" bestelde "+order.coffee;

const details=document.createElement("div");
details.className="order-details";

let extras=[];

if(order.milk) extras.push("🥛 melk");
if(order.sugar) extras.push("🍬 suiker");

details.innerText=extras.length?extras.join(", "):"geen extra's";

const status=document.createElement("div");
status.className="order-status";

if(order.completed){

status.classList.add("done");
status.innerText="Gereed";

}else{

status.classList.add("pending");
status.innerText="In behandeling";

}

info.appendChild(title);
info.appendChild(details);
info.appendChild(status);

div.appendChild(info);

if(!order.completed){

const button=document.createElement("button");
button.className="complete-btn";
button.innerText="☕ Voltooid";

button.onclick=()=>{

update(ref(db,"orders/"+order.key),{
completed:true
});

};

div.appendChild(button);

}

orderList.appendChild(div);

});

});

/* PRODUCTAFBEELDINGEN */

function getProductImage(name){

const images={

"Espresso":"images/espresso_menu_final.webp",
"Long Black":"images/long_black_menu_final.webp",
"Lungo":"images/long_black_menu_final.webp",
"Latte Macchiato":"images/latte_macchiato_menu_final.webp",
"Latte Macchiato Vanille":"images/vanille_menu_final.webp",
"Latte Macchiato Caramel":"images/caramel_menu_final.webp",
"Latte Macchiato Pumpkin Spice":"images/pumpkin_spice_menu_final.webp",
"Ijskoffie":"images/iced_coffee_menu_final.webp",
"Thee":"images/tea_menu_final.webp"

};

return images[name] || "images/espresso_menu_final.webp";

}

</script>

</head>

<body>

<h1>Koffie Dashboard</h1>

<div class="order-list">

<div id="order-list"></div>

</div>

</body>
</html>
