<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f0ebe3;
  padding: 20px;
}

.order {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>📋 Binnenkomende Bestellingen</h1>
<button onclick="clearOrders()" style="margin-bottom:20px;padding:10px;">
  🗑️ Einde dag – wis alle bestellingen
</button>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
  authDomain: "koffie-bestellen.firebaseapp.com",
  databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "koffie-bestellen"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ordersDiv = document.getElementById("orders");

onValue(ref(db, "orders"), snapshot => {
  const data = snapshot.val();
  ordersDiv.innerHTML = "";

  for (let id in data) {
    const order = data[id];

    const div = document.createElement("div");
    div.className = "order";
    div.innerHTML = `
		<strong>${order.coffee}</strong><br>
		Melk: ${order.milk ? "Ja" : "Nee"}<br>
		Suiker: ${order.sugar ? "Ja" : "Nee"}<br>
		Tijd: ${order.time}<br>
		Status: ${order.status}
	`;

    ordersDiv.appendChild(div);
  }
});
window.clearOrders = function() {
  if (confirm("Weet je zeker dat je alle bestellingen wilt verwijderen?")) {
    remove(ref(db, "orders"));
  }
}
</script>

</body>
</html>
