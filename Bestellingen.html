<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellingen Overzicht</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f3ef; padding:20px; }
h1 { text-align:center; color:#3e2723; }
.order-card {
  background:white;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.order-card {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.order-card img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  flex-shrink: 0;
}

.order-info {
  flex: 1;
}

.order-info p {
  margin: 4px 0;
}

button {
  padding: 8px 12px;
  background: #6d4c41;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

/* 📱 Mobiel: onder elkaar */
@media (max-width: 600px) {
  .order-card {
    flex-direction: column;
  }

  .order-card img {
    width: 100%;
    height: 180px;
  }
}
</style>
</head>
<body>

<h1>☕ Bestellingen</h1>
<h2 id="order-count">Open bestellingen: 0</h2>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔹 Firebase config (jouw gegevens invullen)
const firebaseConfig = {
  apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
  authDomain: "koffie-bestellen.firebaseapp.com",
  databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "koffie-bestellen"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ordersRef = ref(db, "orders");

// 🔹 Afbeeldingen koppelen aan koffienaam
const coffeeImages = {
  "Espresso": "espresso.jpg",
  "Long Black": "longblack.jpg",
  "Latte Macchiato": "lattemacchiato.jpg",
  "Latte Macchiato + Pumpkin Spice": "pumpkinspice.jpg",
  "Latte Macchiato + Vanille": "vanille.jpg",
  "Latte Macchiato + Caramel": "caramel.jpg"
};

// 🔹 Bestellingen realtime ophalen
onValue(ordersRef, (snapshot) => {
  const ordersDiv = document.getElementById("orders");
  const countDiv = document.getElementById("order-count");

  ordersDiv.innerHTML = "";

  let orderCount = 0;

  snapshot.forEach((childSnapshot) => {
    orderCount++;

    const order = childSnapshot.val();
    const key = childSnapshot.key;

    const div = document.createElement("div");
    div.className = "order-card";

    const img = document.createElement("img");
    img.src = coffeeImages[order.coffee] || "espresso.jpg";
    div.appendChild(img);

    const infoDiv = document.createElement("div");
    infoDiv.className = "order-info";

    infoDiv.innerHTML = `
      <p><strong>Naam:</strong> ${order.name}</p>
      <p><strong>Koffie:</strong> ${order.coffee}</p>
      <p><strong>Melk:</strong> ${order.milk ? "Ja" : "Nee"}</p>
      <p><strong>Suiker:</strong> ${order.sugar ? "Ja" : "Nee"}</p>
      <p><strong>Tijd:</strong> ${order.time}</p>
    `;

    const doneButton = document.createElement("button");
    doneButton.textContent = "Bestelling afronden";
    doneButton.onclick = () => {
      remove(ref(db, "orders/" + key));
    };

    infoDiv.appendChild(doneButton);
    div.appendChild(infoDiv);
    ordersDiv.appendChild(div);
  });

  // 🔢 Update teller
  countDiv.textContent = `Open bestellingen: ${orderCount}`;
});
</script>

</body>
</html>
