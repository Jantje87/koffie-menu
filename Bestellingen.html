<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koffie Admin Dashboard</title>

<style>

.order{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.order img{
width:40px;
height:40px;
border-radius:8px;
margin-right:10px;
object-fit:cover;
}

.item-left{
display:flex;
align-items:center;
gap:10px;
}

body{
font-family:Arial;
background:#f6f4f2;
margin:0;
}

/* login */

#login-screen{
max-width:400px;
margin:120px auto;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
text-align:center;
}

#login-screen input{
width:100%;
padding:10px;
margin:10px 0;
}

/* admin */

#admin-panel{
display:none;
max-width:1100px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
color:#6d4c41;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
}

.product,
.order{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.product img,
.order img{
width:40px;
height:40px;
object-fit:cover;
border-radius:8px;
margin-right:10px;
}

.item-left{
display:flex;
align-items:center;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-brand{
background:#6d4c41;
color:white;
}

.btn-ok{
background:#4CAF50;
color:white;
}

.btn-danger{
background:#c62828;
color:white;
}

.new{
background:#fff3cd;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login-screen">

<h2>Admin Login</h2>

<input id="admin-email" placeholder="Email">
<input id="admin-password" type="password" placeholder="Password">

<button id="login-btn">Login</button>

</div>

<!-- ADMIN -->

<div id="admin-panel">

<header>

<h1>Koffie Dashboard</h1>

<button id="logout-btn">Logout</button>

</header>

<div class="grid">

<div class="panel">

<h2>Producten</h2>

<div id="product-list"></div>

</div>

<div class="panel">

<h2>Bestellingen</h2>

<button id="clear-orders" class="btn-danger">Wis alle bestellingen</button>

<div id="order-list"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
authDomain:"koffie-bestellen.firebaseapp.com",
databaseURL:"https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"koffie-bestellen",
storageBucket:"koffie-bestellen.firebasestorage.app",
messagingSenderId:"592791423506",
appId:"1:592791423506:web:b4901c0cd2cf9094b9e6cb"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* login */

document.getElementById("login-btn").onclick = () => {

signInWithEmailAndPassword(
auth,
document.getElementById("admin-email").value,
document.getElementById("admin-password").value
);

};

/* auth state */

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("login-screen").style.display="none";
document.getElementById("admin-panel").style.display="block";

initProducts();
initOrders();

}

});

/* logout */

document.getElementById("logout-btn").onclick = () => {

signOut(auth);

location.reload();

};

/* producten */

function initProducts(){

const list=document.getElementById("product-list");

onValue(ref(db,"products"),(snapshot)=>{

list.innerHTML="";

snapshot.forEach(child=>{

const p=child.val();
const key=child.key;

const div=document.createElement("div");
div.className="product";

div.innerHTML=`

<div class="item-left">
<img src="${p.img}">
${p.name}
</div>

<button class="btn-brand">
${p.available?"Verwijder":"Herstel"}
</button>

`;

div.querySelector("button").onclick=()=>{

update(ref(db,"products/"+key),{
available:!p.available
});

};

list.appendChild(div);

});

});

}

/* orders */

function initOrders(){

const list=document.getElementById("order-list");

onValue(ref(db,"orders"),(snapshot)=>{

list.innerHTML="";

let orders=[];

snapshot.forEach(child=>{
orders.push({...child.val(),key:child.key});
});

orders.sort((a,b)=>b.timestamp-a.timestamp);

orders.forEach(order=>{

const div=document.createElement("div");
div.className="order";

const time = new Date(order.timestamp)
.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

div.innerHTML=`

<div class="item-left">

<img src="${order.img || ''}">

<div>

<b>${order.coffee}</b><br>

${order.name}<br>

<small>${time}</small>

</div>

</div>

<div>

<button class="btn-ok">
${order.completed?"Voltooid":"Markeer klaar"}
</button>

</div>

`;

div.querySelector("button").onclick=()=>{

update(ref(db,"orders/"+order.key),{
completed:true
});

};

list.appendChild(div);

});

});

}

/* clear orders */

document.getElementById("clear-orders").onclick=()=>{

if(confirm("Alle bestellingen verwijderen?")){

remove(ref(db,"orders"));

}

};

</script>

</body>
</html>
