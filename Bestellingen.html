<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Admin - Bestellingen en Producten</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #6d4c41;
    }

    .product-list, .order-list {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .product, .order {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid #ccc;
    }

    .order span, .product span {
      font-size: 16px;
    }

    .toggle-btn {
      padding: 8px 16px;
      background: #6d4c41;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #8d6e63;
    }

    .order-detail {
      font-size: 14px;
      color: #555;
    }

    .order-list h2, .product-list h2 {
      text-align: center;
      color: #6d4c41;
    }

    .order-btn {
      background: #4CAF50;  /* Groen voor Voltooid */
    }

    .order-btn:hover {
      background: #45a049;
    }
  </style>

  <!-- Firebase config en import -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, query, orderByKey } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    // Firebase configuratie
    const firebaseConfig = {
       apiKey: "AIzaSyAjLIU_c7tzLrajP0pJ5jo949SkiF5ELQY",
       authDomain: "koffie-bestellen.firebaseapp.com",
       databaseURL: "https://koffie-bestellen-default-rtdb.europe-west1.firebasedatabase.app",
       projectId: "koffie-bestellen",
       storageBucket: "koffie-bestellen.firebasestorage.app",
       messagingSenderId: "592791423506",
       appId: "1:592791423506:web:b4901c0cd2cf9094b9e6cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Realtime producten beheren
    const productsRef = ref(db, "products");
    const productList = document.getElementById("product-list");

    onValue(productsRef, (snapshot) => {
      productList.innerHTML = "";
      snapshot.forEach(childSnapshot => {
        const product = childSnapshot.val();
        const productKey = childSnapshot.key;

        const productDiv = document.createElement("div");
        productDiv.className = "product";

        const productName = document.createElement("span");
        productName.textContent = product.name;
        productDiv.appendChild(productName);

        const toggleButton = document.createElement("button");
        toggleButton.className = "toggle-btn";
        toggleButton.textContent = product.available ? "Verwijder" : "Herstel";
        toggleButton.onclick = () => {
          const available = !product.available;
          update(ref(db, `products/${productKey}`), { available });
        };

        productDiv.appendChild(toggleButton);
        productList.appendChild(productDiv);
      });
    });

    // Realtime bestellingen ophalen (met omgekeerde volgorde)
    const ordersRef = ref(db, "orders");
    const orderList = document.getElementById("order-list");

    // Query om bestellingen in omgekeerde volgorde op te halen (nieuwe bovenaan)
    const ordersQuery = query(ordersRef, orderByKey());

    onValue(ordersQuery, (snapshot) => {
      orderList.innerHTML = "";
      snapshot.forEach(childSnapshot => {
        const order = childSnapshot.val();
        const orderKey = childSnapshot.key;

        const orderDiv = document.createElement("div");
        orderDiv.className = "order";

        const orderDetails = document.createElement("span");
        orderDetails.textContent = `${order.name} bestelde een ${order.coffee} om ${order.time}`;
        orderDiv.appendChild(orderDetails);

        const orderDetailDiv = document.createElement("div");
        orderDetailDiv.className = "order-detail";
        orderDetailDiv.textContent = `Melk: ${order.milk ? "Ja" : "Nee"}, Suiker: ${order.sugar ? "Ja" : "Nee"}`;
        orderDiv.appendChild(orderDetailDiv);

        // Knop om bestelling als voltooid te markeren
        const completeButton = document.createElement("button");
        completeButton.className = "toggle-btn order-btn";
        completeButton.textContent = order.completed ? "Voltooid" : "Markeer als Voltooid";
        completeButton.onclick = () => {
          // Update de status van de bestelling naar 'voltooid'
          update(ref(db, `orders/${orderKey}`), { completed: true });
        };

        // Voeg de knop toe aan de bestelling
        orderDiv.appendChild(completeButton);
        orderList.appendChild(orderDiv);
      });
    });

  </script>
</head>
<body>
  <h1>Admin Paneel</h1>

  <!-- Producten beheren -->
  <div class="product-list">
    <h2>Producten</h2>
    <div id="product-list">
      <!-- Producten worden hier geladen -->
    </div>
  </div>

  <!-- Bestellingen bekijken -->
  <div class="order-list">
    <h2>Bestellingen</h2>
    <div id="order-list">
      <!-- Bestellingen worden hier geladen -->
    </div>
  </div>

</body>
</html>
